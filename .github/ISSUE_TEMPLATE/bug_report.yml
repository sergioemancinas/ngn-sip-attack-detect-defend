name: Bug report
description: Something in the stack does not work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do **not** report security vulnerabilities here — see `SECURITY.md`.
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands (e.g. `make up-all`, `make e2e`) and which stage failed.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Container logs, `make e2e` output, or ClickHouse query results. Redact any real values.
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Docker/Colima version, and RAM allocated to the VM.
      placeholder: "macOS 15, Colima 0.8, 18 GiB"
    validations:
      required: true
