name: Reusable Image Build

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: linux/amd64
      push:
        required: false
        type: boolean
        default: false
      scan:
        required: false
        type: boolean
        default: true
      version-tag:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-scan:
    name: ${{ inputs.image-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          VERSION_TAG: ${{ inputs.version-tag }}
        run: |
          image_ref="ghcr.io/${GITHUB_REPOSITORY}/ngn-sip-${IMAGE_NAME}"
          tags="${image_ref}:${GITHUB_SHA}"
          if [ -n "$VERSION_TAG" ]; then
            tags="${tags}"$'\n'"${image_ref}:${VERSION_TAG}"
          fi
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf "%s\n" "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          load: ${{ inputs.scan && !inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.image-name }}
          cache-to: type=gha,scope=${{ inputs.image-name }},mode=max

      - name: Cache Trivy database
        if: inputs.scan
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Trivy critical/high fixable gate
        if: inputs.scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
