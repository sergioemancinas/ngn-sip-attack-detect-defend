name: Aikido Security Gate

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip aikido]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --no-banner --redact --exit-code 1

  aikido-scan:
    name: Aikido SAST / SCA / Secrets / IaC
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip aikido]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AIKIDO_CLIENT_API_KEY: ${{ secrets.AIKIDO_CLIENT_API_KEY }}
      AIKIDO_PERSONAL_API_KEY: ${{ secrets.AIKIDO_PERSONAL_API_KEY }}
    steps:
      - name: Verify Aikido secret is configured
        run: |
          if [ -z "${AIKIDO_CLIENT_API_KEY:-${AIKIDO_PERSONAL_API_KEY:-}}" ]; then
            echo "::error::Neither AIKIDO_CLIENT_API_KEY nor AIKIDO_PERSONAL_API_KEY is set."
            echo "Generate a CI client key in Aikido under Integrations > CI/CD,"
            echo "then add it as a repository secret named AIKIDO_CLIENT_API_KEY."
            exit 1
          fi

      - name: Preflight Aikido authentication
        run: |
          key="${AIKIDO_CLIENT_API_KEY:-${AIKIDO_PERSONAL_API_KEY:-}}"

          if [ -n "${AIKIDO_CLIENT_API_KEY:-}" ]; then
            key_source="AIKIDO_CLIENT_API_KEY"
          else
            key_source="AIKIDO_PERSONAL_API_KEY"
          fi

          if [[ "${key}" == AIK_CI_US_* ]]; then
            api_url="${AIKIDO_US_API:-https://app.us.aikido.dev}"
          elif [[ "${key}" == AIK_CI_ME_* ]]; then
            api_url="${AIKIDO_ME_API:-https://app.me.aikido.dev}"
          else
            api_url="${AIKIDO_API:-https://app.aikido.dev}"
          fi

          auth_header_name="X-AIK-API-SECRET"
          echo "Aikido preflight auth header: ${auth_header_name} (secret source: ${key_source})"

          status_code="$(
            curl -sS -o /tmp/aikido_preflight_response.txt -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "${auth_header_name}: ${key}" \
              --data '{}' \
              "${api_url}/api/integrations/continuous_integration/scan/repository"
          )"

          if [ "${status_code}" = "401" ]; then
            echo "::error::Aikido auth preflight failed with HTTP 401 using header ${auth_header_name} (secret source: ${key_source}). The key is likely rotated or revoked. Rotate the repository secret ${key_source}. Docs: https://app.aikido.dev/settings/integrations/continuous-integration and https://aikido-dev.notion.site/aikido-dev/Aikido-CI-API-78d318b5f5f7477ab072e12f94b21374"
            exit 1
          fi

          if [ "${status_code}" = "000" ]; then
            echo "::error::Aikido auth preflight could not reach ${api_url}. Verify network connectivity to Aikido before re-running."
            exit 1
          fi

          echo "Aikido auth preflight completed with HTTP ${status_code}; continuing to scan."

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install Aikido CI API client
        run: npm install --global @aikidosec/ci-api-client

      - name: Run Aikido scan
        run: |
          key="${AIKIDO_CLIENT_API_KEY:-${AIKIDO_PERSONAL_API_KEY:-}}"
          set +e
          # scan-release requires a paid Aikido plan (release gating).
          # The free-tier-compatible command is `scan` with the signature:
          #   scan <repository_id> <base_commit_id> <head_commit_id> [branch_name]
          # It compares the two SHAs and surfaces NEW findings only.
          base_sha="${{ github.event.pull_request.base.sha }}"
          if [ -z "${base_sha}" ]; then
            base_sha="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          branch_name="${{ github.head_ref || github.ref_name }}"
          # --fail-on-*-scan flags require a paid Aikido plan. On the free
          # tier we run the scan in informational mode; results land in the
          # Aikido dashboard. Set AIKIDO_FAIL_ON_FINDINGS=true in the repo
          # variables (not secrets) once the workspace is on a paid plan to
          # enable hard gating.
          fail_flags=""
          if [ "${AIKIDO_FAIL_ON_FINDINGS:-false}" = "true" ]; then
            fail_flags="--fail-on-sast-scan --fail-on-iac-scan --fail-on-secrets-scan"
          fi
          aikido-api-client scan \
            "${{ github.event.repository.name }}" \
            "${base_sha}" \
            "${head_sha}" \
            "${branch_name}" \
            --apikey "${key}" \
            ${fail_flags}
          status="$?"
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error::Aikido scan failed. If the log says 401 Invalid API key, rotate AIKIDO_CLIENT_API_KEY."
            exit "$status"
          fi
