name: Container Vulnerability Gate

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  image-gate:
    name: Build and scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pgvector
            context: infra/postgres
            dockerfile: infra/postgres/Dockerfile
          - image: asterisk
            context: infra/asterisk
            dockerfile: infra/asterisk/Dockerfile
          - image: kamailio
            context: infra/kamailio
            dockerfile: infra/kamailio/Dockerfile
          - image: rtpengine
            context: infra/rtpengine
            dockerfile: infra/rtpengine/Dockerfile
          - image: sipp
            context: infra/sipp
            dockerfile: infra/sipp/Dockerfile
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        env:
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          image_ref="ghcr.io/${GITHUB_REPOSITORY}/ngn-sip-${IMAGE_NAME}"
          tags="${image_ref}:${GITHUB_SHA}"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf "%s\n" "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Cache Trivy database
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Trivy critical/high fixable gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
