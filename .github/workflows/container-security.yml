name: Container Vulnerability Gate

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  image-gate:
    name: Build and scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pgvector
            context: infra/postgres
            dockerfile: infra/postgres/Dockerfile
          - image: asterisk
            context: infra/asterisk
            dockerfile: infra/asterisk/Dockerfile
          - image: kamailio
            context: infra/kamailio
            dockerfile: infra/kamailio/Dockerfile
          - image: rtpengine
            context: infra/rtpengine
            dockerfile: infra/rtpengine/Dockerfile
          - image: sipp
            context: infra/sipp
            dockerfile: infra/sipp/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        env:
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          image_ref="ghcr.io/${GITHUB_REPOSITORY}/ngn-sip-${IMAGE_NAME}"
          tags="${image_ref}:${GITHUB_SHA}"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf "%s\n" "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Trivy critical/high fixable gate
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
