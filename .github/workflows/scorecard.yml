# OpenSSF Scorecard — supply-chain / security-posture scoring. Publishes results
# to the repo's code-scanning tab and (on the default branch) the public
# Scorecard API for a badge. Least-privilege by default; only the analysis job
# is granted the tokens it needs.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 4 * * 1"  # weekly, Monday
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    # OpenSSF Scorecard only works on public repositories; skip while private so
    # it does not fail every push. It starts running once the repo is public.
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code-scanning
      id-token: write          # publish results to the Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
