name: ngn-sip-ids

services:
  suricata:
    image: jasonish/suricata:7.0.10
    command:
      - -i
      - eth0
      - --runmode
      - workers
      - -c
      - /etc/suricata/suricata.yaml
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    pids_limit: 500
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - ./ids/suricata/etc/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./ids/suricata/etc/classification.config:/etc/suricata/classification.config:ro
      - ./ids/suricata/etc/reference.config:/etc/suricata/reference.config:ro
      - ./ids/suricata/rules:/etc/suricata/rules:ro
      - suricata_logs:/var/log/suricata
      - asterisk_logs:/logs/asterisk:ro
    # Share the Kamailio container network namespace so Suricata observes the
    # SIP edge traffic directly. On a plain bridge a container only sees its own
    # and broadcast frames, so cross-container SIP unicast is invisible and the
    # SIP app-layer parser produces zero events. service:kamailio cannot be used
    # because Kamailio lives in a separate compose project (ngn-sip), so the
    # concrete container name is required. Verified: 0 -> 24 parsed SIP events.
    network_mode: "container:ngn-sip-kamailio-1"
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/log/suricata/eve.json && find /var/log/suricata/eve.json -mmin -5 | grep -q ."]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  # Named explicitly so the observability stack can mount this volume as
  # external (Vector reads /var/log/suricata/eve.json to ship alerts into
  # ClickHouse). Without the explicit name, Compose would prefix it with
  # the project name and the cross-stack mount would not resolve.
  suricata_logs:
    name: ngn-sip-ids_suricata_logs
  asterisk_logs:
    external: true
    name: ngn-sip_asterisk_logs
