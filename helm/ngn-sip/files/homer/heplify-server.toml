  "ruri_user",
  "ruri_domain",
  "from_user",
  "from_tag",
  "to_user",
  "to_tag",
  "callid",
  "cseq",
  "method",
  "user_agent"
]

LogDbg = ""
LogLvl = "info"
LogStd = true
LogSys = false
Config = "/tmp/heplify-server.toml"
ConfigHTTPAddr = ""
ConfigHTTPPW = ""
