#!KAMAILIO

debug=2
log_stderror=yes
fork=no
children=2
auto_aliases=no
alias="ngn.lab"
server_header="Server: NGN-Lab-Kamailio"
user_agent_header="User-Agent: NGN-Lab-Kamailio"

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
# Prometheus scrape endpoint via xhttp_prom; reachable on the sip_lab docker
# network at kamailio:8089/metrics. Never published to the host.
listen=tcp:0.0.0.0:8089 name "xprom"

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "pv.so"
loadmodule "ctl.so"
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "sanity.so"
loadmodule "htable.so"

modparam("ctl", "binrpc", "unix:/run/kamailio/kamailio_ctl")
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# HEP capture for C1 response-level telemetry (Homer / heplify-server).
# Comment out the next line to disable siptrace export without removing the module file.
#!define HEP_CAPTURE_ENABLE
#!include_file "/etc/kamailio/modules/siptrace.cfg"

# tls.cfg is included first so that, when TLS_ENABLE is set, tls.so initialises OpenSSL
# before the auth/database modules, as the tls module admin guide recommends. All of these
# includes are gated (TLS_ENABLE / AUTH_ENABLE / SECFILTER_ENFORCE / TOPOH_ENABLE) or load
# always-on helpers; ordering has no effect on the default un-hardened runtime.
#!include_file "/etc/kamailio/modules/tls.cfg"
#!include_file "/etc/kamailio/modules/auth.cfg"
#!include_file "/etc/kamailio/modules/secfilter.cfg"
#!include_file "/etc/kamailio/modules/pike.cfg"
#!include_file "/etc/kamailio/modules/topoh.cfg"
#!include_file "/etc/kamailio/modules/prometheus.cfg"
#!include_file "/etc/kamailio/modules/htable.cfg"
#!include_file "/etc/kamailio/modules/ban.cfg"

request_route {
    route(DROP_IF_BANNED);

#!ifdef HEP_CAPTURE_ENABLE
    route(HEP_TRACE_REQUEST);
#!endif

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # --- NGN-SEC rate-based flood detection (PIKE) ----------------------------
    # PIKE flags any source exceeding the configured request rate. Emit a single
    # "PIKE BLOCKING ip <src>" event per offending source per dedup window
    # (Wazuh decoder kamailio-pike -> rule 100103, T1499). This is IOC-free, so
    # it catches volumetric floods even when the User-Agent is spoofed. Detection
    # only - the request still flows so the Suricata and ML arms see identical
    # traffic; inline blocking is left to ban.cfg / the SOAR active response.
    if (!pike_check_req()) {
        if ($sht(sec_seen=>pike_$si) == $null) {
            $sht(sec_seen=>pike_$si) = 1;
            xlog("L_WARN", "pike: PIKE BLOCKING ip $si\n");
            xlog("L_WARN", "NGN-SEC $rm src=$si ua=\"$ua\" reason=\"pike_flood\"\n");
        }
    }

    if (!sanity_check("1511", "7")) {
        # Malformed SIP: emit a structured NGN-SEC event (Wazuh decoder + base
        # rule 100100, header-violation rules 100113-100116), throttled to one
        # per source per window, then drop silently as before.
        if ($sht(sec_seen=>mf_$si) == $null) {
            $sht(sec_seen=>mf_$si) = 1;
            xlog("L_WARN", "NGN-SEC $rm src=$si ua=\"$ua\" reason=\"malformed_sip_sanity\"\n");
        }
        exit;
    }
    # Malformed SIP is dropped above in all modes (it already exits). The optional
    # scanner-UA enforcement below is gated so detection-only behaviour is the default.

#!ifdef AUTH_ENABLE
    route(SBC_AUTH);
#!endif

    if (is_method("OPTIONS") && $rU == $null) {
        sl_send_reply("200", "Keepalive");
        exit;
    }

    # --- NGN-SEC scanner-UA detection (IOC) -----------------------------------
    # Emit a structured event when the User-Agent matches a known SIP attack-tool
    # family (Wazuh rules 100107/100109, T1595.001). Throttled to one event per
    # source per dedup window so a high-rate scan or scanner-driven flood raises
    # a single actionable alert instead of an alert storm. Detection only: the
    # request is still proxied so the signature and ML arms see the same packets.
    if ($ua != $null) {
        $var(ua_lc) = $(ua{s.tolower});
        if ($var(ua_lc) =~ "(friendly-scanner|sipvicious|sipsak|svmap|svwar|svcrack|sipcli|sippts|pplsip|sundayddr|vaxsip|sip-scan|smap|iwar)") {
            if ($sht(sec_seen=>scan_$si) == $null) {
                $sht(sec_seen=>scan_$si) = 1;
                xlog("L_WARN", "NGN-SEC $rm src=$si ua=\"$ua\" reason=\"known_scanner_ua\"\n");
            }
#!ifdef SECFILTER_ENFORCE
            # Preventive edge control (exposed deployment only, see modules/secfilter.cfg).
            # Off by default to preserve the C3 detection-only experiment. The NGN-SEC
            # event above is already emitted, so detection/telemetry is unaffected.
            xlog("L_WARN", "NGN-SEC $rm src=$si ua=\"$ua\" reason=\"secfilter_block_scanner_ua\"\n");
            sl_send_reply("403", "Forbidden");
            exit;
#!endif
        }
    }

    if (is_method("INVITE")) {
        record_route();
    }

    if (loose_route()) {
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
    }

    xlog("L_INFO", "proxying $rm from $fu to Asterisk at $si:$sp\n");
    $du = "sip:asterisk:5060";

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

#!ifdef HEP_CAPTURE_ENABLE
onreply_route {
    route(HEP_TRACE_REPLY);
}
#!endif
