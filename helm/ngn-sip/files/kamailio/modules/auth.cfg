# SBC digest authentication (RFC 3261 Sec 26). Gated by AUTH_ENABLE so it is inert by
# default and config-check passes. Authentication is currently delegated to Asterisk;
# enabling this challenges REGISTER (and optionally INVITE) at the Kamailio edge so
# unauthenticated abuse is rejected before t_relay, which is the preventive control an
# exposed SBC should provide.
#
# Trust boundary: with AUTH_ENABLE the edge challenges and Asterisk re-validates, so
# credentials must be consistent between the auth_db source and Asterisk's pjsip endpoints
# (1000/1001 in pjsip.conf). Misconfiguration here rejects legitimate REGISTER, so enable
# in a maintenance window and re-run the SIPp smoke before exposing ports.
#
# Enable steps:
#   1. Provision a credentials source (auth_db against the existing PostgreSQL subscriber
#      table, or auth with a static AoR for the lab) matching Asterisk's endpoints.
#   2. Add  #!define AUTH_ENABLE  to kamailio.cfg, validate with `kamailio -c`, restart,
#      then confirm REGISTER is challenged (401) and a credentialled REGISTER succeeds.
#      request_route calls route(SBC_AUTH) under the same AUTH_ENABLE flag (after
#      sanity_check, before relay).
#
#!ifdef AUTH_ENABLE
loadmodule "auth.so"
# auth_db depends on a database driver module being loaded first (auth_db admin guide,
# Dependencies). db_postgres ships in kamailio-postgres-modules (see Dockerfile) and
# registers the postgres:// db_url scheme used below.
loadmodule "db_postgres.so"
loadmodule "auth_db.so"
modparam("auth_db", "db_url", "postgres://ngn@postgres:5432/ngn_sip")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "password_column", "password")
# Challenge REGISTER at the edge; reject what cannot authenticate. INVITE auth optional.
route[SBC_AUTH] {
    if (is_method("REGISTER")) {
        if (!auth_check("$fd", "subscriber", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        consume_credentials();
    }
}
#!endif
