# Kamailio xhttp_prom: Prometheus metrics exposition over a dedicated TCP port.
# Bound to 8089/tcp (declared in kamailio.cfg via `listen=tcp:0.0.0.0:8089 name "xprom"`).
# Scraped by observability/prometheus/prometheus.yml job: kamailio.
# Exposes the full Kamailio counter set (`all`); shape-shift to a curated list
# once we know which counters actually drive dashboards.

loadmodule "xhttp.so"
loadmodule "xhttp_prom.so"

modparam("xhttp_prom", "xhttp_prom_stats", "all")

event_route[xhttp:request] {
    # Refuse anything that didn't arrive on the dedicated metrics listener.
    if ($Rp != 8089) {
        xhttp_reply("403", "Forbidden", "text/plain", "");
        exit;
    }
    if ($hu =~ "^/metrics") {
        prom_dispatch();
        exit;
    }
    xhttp_reply("404", "Not Found", "text/plain", "");
}
