# Edge enforcement (preventive control) for the NGN SIP SBC.
#
# Background. The request_route detection logic (scanner-UA IOC, malformed-SIP sanity,
# PIKE rate) is intentionally DETECTION-ONLY during measurement: the C3 comparison
# (signature vs correlation vs ML) requires all three arms to see identical traffic, so
# the proxy must not drop attack traffic mid-experiment. That is correct for the lab but
# leaves the edge with no preventive control, which the security audit flagged against
# RFC 3261 Sec 26 once the SBC is exposed on the campus VM.
#
# This module adds an OPTIONAL preventive layer that blocks known-bad traffic at the edge
# BEFORE it reaches Asterisk, gated by the SECFILTER_ENFORCE compile flag so it is off by
# default (experiment preserved) and on only for the internet-facing deployment:
#
#   kamailio ... -DSECFILTER_ENFORCE                # CLI, or
#   #!define SECFILTER_ENFORCE                       # uncomment in kamailio.cfg
#
# When enforcement is on, kamailio.cfg drops (a) requests whose User-Agent matches the
# known SIP attack-tool families and (b) malformed SIP that fails sanity_check, after the
# NGN-SEC event is emitted so detection/telemetry is unchanged. PIKE flood handling and
# the ban_table/ban_allowlist drop remain as defined in pike.cfg / ban.cfg.
#
# This is edge request filtering, not authentication or transport encryption. Digest auth
# (auth.cfg) and TLS/SIPS (tls.cfg) remain the additional RFC 3261 Sec 26 controls and are
# tracked separately; enable them in a maintenance window with the step-ca PKI.
#
# No extra module is loaded here: enforcement reuses textops/pv/htable already loaded in
# kamailio.cfg, so toggling the flag cannot fail module loading at startup.
