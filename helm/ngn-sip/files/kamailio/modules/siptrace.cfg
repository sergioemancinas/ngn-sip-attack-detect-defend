# Kamailio HEPv3 SIP capture for Homer / HEPlify (C1 response-level telemetry).
#
# Enable by defining HEP_CAPTURE_ENABLE in kamailio.cfg (comment the define to disable).
# Duplicate URI targets heplify-server on the sip_lab Docker network (UDP 9060).
#
# References:
# - https://www.kamailio.org/docs/modules/5.8.x/modules/siptrace.html
# - https://github.com/sipcapture/homer/wiki/Example:-Kamailio

#!ifdef HEP_CAPTURE_ENABLE

loadmodule "siptrace.so"

#!substdef "!HEP_DST!heplify-server:9060!g"

# HEPv3 duplication of every traced message (requests + replies) to heplify-server.
# Conservative modparam set valid for siptrace in Kamailio 5.8: duplicate_uri +
# hep_mode_on + hep_version send HEPv3 over UDP; trace_on enables, trace_to_database
# off (Homer/heplify is the store, not Kamailio's DB).
modparam("siptrace", "duplicate_uri", "sip:HEP_DST")
modparam("siptrace", "hep_mode_on", 1)
modparam("siptrace", "hep_version", 3)
modparam("siptrace", "trace_to_database", 0)
modparam("siptrace", "trace_on", 1)

# Mirror requests and replies; skip OPTIONS keepalive to reduce noise.
route[HEP_TRACE_REQUEST] {
    if (is_method("OPTIONS") && $rU == $null) {
        return;
    }
    sip_trace();
}

route[HEP_TRACE_REPLY] {
    sip_trace();
}

#!endif
