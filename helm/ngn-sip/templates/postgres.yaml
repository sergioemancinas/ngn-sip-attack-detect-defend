{{- if .Values.tiers.postgres }}
# pgvector-enabled Postgres (subscribers + RAG store). StatefulSet + PVC.
# Compose: cap_drop ALL + CHOWN/DAC_OVERRIDE/SETGID/SETUID, no-new-privileges.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ .Values.images.postgres | quote }}
          imagePullPolicy: {{ include "ngn-sip.pullPolicy" . }}
          securityContext:
            allowPrivilegeEscalation: false   # no-new-privileges:true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "SETGID", "SETUID"]
          env:
            - name: POSTGRES_DB
              value: {{ .Values.config.postgresDb | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.config.postgresUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: ngn-sip-secrets, key: POSTGRES_PASSWORD }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 8
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "ngn-sip.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
