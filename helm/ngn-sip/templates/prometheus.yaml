{{- if .Values.tiers.prometheus }}
# Prometheus. Compose: cap_drop ALL, read-only rootfs, no-new-privileges,
# tmpfs /tmp, prometheus_data volume, retention 15d / 2GB.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "prometheus") | nindent 4 }}
spec:
  selector:
    {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "prometheus") | nindent 4 }}
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "prometheus") | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- include "ngn-sip.storageClass" . | nindent 2 }}
  resources:
    requests:
      storage: {{ .Values.prometheus.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "prometheus") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "prometheus") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "prometheus") | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: {{ .Values.images.prometheus | quote }}
          imagePullPolicy: {{ include "ngn-sip.pullPolicy" . }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.prometheus.retentionTime }}
            - --storage.tsdb.retention.size={{ .Values.prometheus.retentionSize }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 9090
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /prometheus
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
        - name: config
          configMap:
            name: prometheus-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
{{- end }}
