{{- if .Values.secrets.create }}
# Single Secret consumed by every tier via secretKeyRef / envFrom.
# PLACEHOLDER values come from .Values.secrets — override them, never commit real
# credentials. Set secrets.create=false to supply your own `ngn-sip-secrets`.
apiVersion: v1
kind: Secret
metadata:
  name: ngn-sip-secrets
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "secrets") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.secrets.clickhousePassword | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
  GRAFANA_OIDC_CLIENT_SECRET: {{ .Values.secrets.grafanaOidcClientSecret | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.secrets.keycloakAdminPassword | quote }}
  KEYCLOAK_WAZUH_CLIENT_SECRET: {{ .Values.secrets.keycloakWazuhClientSecret | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.secrets.keycloakClientSecret | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  WAZUH_INDEXER_PASSWORD: {{ .Values.secrets.wazuhIndexerPassword | quote }}
  WAZUH_API_PASSWORD: {{ .Values.secrets.wazuhApiPassword | quote }}
  WAZUH_DASHBOARD_PASSWORD: {{ .Values.secrets.wazuhDashboardPassword | quote }}
  HOMER_DB_PASSWORD: {{ .Values.secrets.homerDbPassword | quote }}
  HOMER_ADMIN_PASSWORD: {{ .Values.secrets.homerAdminPassword | quote }}
  KAMCMD_BLOCK_RELAY_TOKEN: {{ .Values.secrets.kamcmdRelayToken | quote }}
  # Derived DSN for stage2-worker (mirrors POSTGRES_DSN in .env.example).
  POSTGRES_DSN: {{ printf "postgresql://%s:%s@postgres:5432/%s" .Values.config.postgresUser .Values.secrets.postgresPassword .Values.config.postgresDb | quote }}
{{- end }}
