{{- if .Values.tiers.wazuhIndexer }}
# ===========================================================================
# Wazuh indexer (OpenSearch fork). StatefulSet + data PVC (3g ceiling for a 1g
# JVM heap, as Compose). Requires TLS material: a cert-generator Job populates a
# shared RWX `wazuh-certs` PVC once, then the indexer mounts it read-only. The
# entrypoint renders the admin/kibanaserver bcrypt hashes at start (identical to
# Compose) so the passwords come from the Secret, never a baked config.
# ===========================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-indexer-config
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "wazuh-indexer") | nindent 4 }}
data:
  {{- (.Files.Glob "files/wazuh/opensearch-local.yml").AsConfig | nindent 2 }}
  {{- (.Files.Glob "files/wazuh/internal_users.yml").AsConfig | nindent 2 }}
  {{- (.Files.Glob "files/wazuh/certs.yml").AsConfig | nindent 2 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wazuh-certs
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "wazuh-indexer") | nindent 4 }}
spec:
  # RWX so the manager + dashboard pods can also mount the same cert material.
  accessModes: ["{{ .Values.sharedLogs.accessMode }}"]
  {{- include "ngn-sip.storageClass" . | nindent 2 }}
  resources:
    requests:
      storage: 256Mi
---
# Cert generator (Compose: wazuh-certs-generator, run-once). Idempotent: skips
# if material already present. Modeled as a Job.
apiVersion: batch/v1
kind: Job
metadata:
  name: wazuh-certs-generator
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "wazuh-certs-generator") | nindent 4 }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "wazuh-certs-generator") | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: certs-generator
          image: wazuh/wazuh-certs-generator:0.0.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE", "SETUID", "SETGID"]
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              if [ -f /certificates/root-ca.pem ]; then
                echo "certs exist; skipping"
              else
                /entrypoint.sh
              fi
              chmod 555 /certificates
          env:
            - name: CERT_TOOL_VERSION
              value: "4.14"
          volumeMounts:
            - name: certs
              mountPath: /certificates
            - name: config
              mountPath: /config/certs.yml
              subPath: certs.yml
              readOnly: true
      volumes:
        - name: certs
          persistentVolumeClaim:
            claimName: wazuh-certs
        - name: config
          configMap:
            name: wazuh-indexer-config
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-indexer
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "wazuh-indexer") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "wazuh-indexer") | nindent 4 }}
  ports:
    - name: https
      port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-indexer
  labels:
    {{- include "ngn-sip.labels" (dict "root" . "component" "wazuh-indexer") | nindent 4 }}
spec:
  serviceName: wazuh-indexer
  replicas: 1
  selector:
    matchLabels:
      {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "wazuh-indexer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ngn-sip.selectorLabels" (dict "root" . "component" "wazuh-indexer") | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wazuh-indexer
          image: {{ .Values.images.wazuhIndexer | quote }}
          imagePullPolicy: {{ include "ngn-sip.pullPolicy" . }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["IPC_LOCK", "SETUID", "SETGID"]
          command: ["/bin/bash", "-c"]
          args:
            - |
              printf '#!/bin/sh\ncommand -v "$1"\n' > /tmp/which
              chmod +x /tmp/which
              export PATH="/tmp:/usr/share/wazuh-indexer/jdk/bin:${PATH}"
              ADMIN_HASH="$(/usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh -p "${WAZUH_INDEXER_PASSWORD}" | tail -n 1)"
              KIBANASERVER_HASH="$(/usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh -p "${WAZUH_DASHBOARD_PASSWORD}" | tail -n 1)"
              sed -e "s|__WAZUH_ADMIN_HASH__|${ADMIN_HASH}|g" -e "s|__WAZUH_KIBANASERVER_HASH__|${KIBANASERVER_HASH}|g" /tmp/internal_users.template.yml > /usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml
              exec /entrypoint.sh opensearchwrapper
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.wazuhIndexer.javaOpts | quote }}
            - name: bootstrap.memory_lock
              value: "true"
            - name: cluster.name
              value: wazuh-cluster
            - name: node.name
              value: wazuh-indexer
            - name: discovery.type
              value: single-node
            - name: WAZUH_INDEXER_PASSWORD
              valueFrom:
                secretKeyRef: { name: ngn-sip-secrets, key: WAZUH_INDEXER_PASSWORD }
            - name: WAZUH_DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef: { name: ngn-sip-secrets, key: WAZUH_DASHBOARD_PASSWORD }
          ports:
            - containerPort: 9200
          resources:
            {{- toYaml .Values.wazuhIndexer.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /var/lib/wazuh-indexer
            - name: certs
              mountPath: /usr/share/wazuh-indexer/config/certs
              readOnly: true
            - name: config
              mountPath: /usr/share/wazuh-indexer/config/opensearch.yml
              subPath: opensearch-local.yml
              readOnly: true
            - name: config
              mountPath: /tmp/internal_users.template.yml
              subPath: internal_users.yml
              readOnly: true
      volumes:
        - name: certs
          persistentVolumeClaim:
            claimName: wazuh-certs
        - name: config
          configMap:
            name: wazuh-indexer-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "ngn-sip.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.wazuhIndexer.storage }}
{{- end }}
