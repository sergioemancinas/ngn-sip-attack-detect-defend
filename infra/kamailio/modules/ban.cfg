route[DROP_IF_BANNED] {
    # Never drop a protected/allowlisted source. UDP source IPs are spoofable
    # (RFC 3261 Sec 26), so an attacker could forge an internal peer address to
    # get it banned; the allowlist guarantees stack traffic is never collateral.
    if ($sht(ban_allowlist=>$si) != $null) {
        return;
    }
    if ($sht(ban_table=>$si) != $null) {
        xlog("L_WARN", "Dropping banned SIP source $si:$sp\n");
        drop;
    }
}
