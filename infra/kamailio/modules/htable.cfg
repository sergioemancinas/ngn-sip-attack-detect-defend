# Kamailio htable state.
# ban_table : sources actively banned by Wazuh active response (see ban.cfg).
# sec_seen  : short-lived dedup keys so each security event type is emitted at
#             most once per source per autoexpire window. This prevents NGN-SEC
#             alert storms under high-rate scans/floods (one flood otherwise
#             produced tens of thousands of identical Wazuh alerts).
modparam("htable", "htable", "ban_table=>size=8;autoexpire=3600;")
modparam("htable", "htable", "sec_seen=>size=10;autoexpire=60;")
# ban_allowlist : protected stack sources (Asterisk, registrar, monitoring, internal
#                 infra) that DROP_IF_BANNED must never drop. Populated by the autoban
#                 sidecar from the live sip_lab container IPs. No autoexpire (persistent).
#                 Anti-spoofing safeguard so a forged internal source cannot be banned.
modparam("htable", "htable", "ban_allowlist=>size=8;autoexpire=0;")
