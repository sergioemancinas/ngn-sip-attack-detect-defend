# PIKE: per-source SIP request-rate guard for rate-based flood detection.
# A source exceeding reqs_density_per_unit requests within sampling_time_unit
# seconds is flagged for remove_latency seconds. Used in request_route to emit a
# single "PIKE BLOCKING ip <src>" event per offending source (Wazuh decoder
# kamailio-pike -> rule 100103, MITRE T1499). This catches volumetric floods
# regardless of User-Agent, so it complements the IOC (scanner-UA) detection.
loadmodule "pike.so"
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 120)
