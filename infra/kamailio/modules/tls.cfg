# TLS / SIPS transport (RFC 3261 Sec 26.2.1 Transport and Network Layer Security, 26.2.2
# SIPS URI Scheme). Gated by TLS_ENABLE so it is inert by default and config-check passes
# without certs. Enable for the exposed deployment in a maintenance window AFTER provisioning
# certs and publishing 5061/tcp in docker-compose.yml.
#
# Enable steps:
#   1. Provision certs (step-ca or, for the lab, a self-signed pair):
#        mkdir -p infra/tls
#        openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
#          -keyout infra/tls/kamailio.key -out infra/tls/kamailio.crt \
#          -subj "/CN=ngn-sip-lab"
#      (infra/tls/* is gitignored; never commit private keys.)
#   2. Mount infra/tls read-only into the kamailio container at /etc/kamailio/tls and
#      uncomment the "${SIP_BIND_IP:-127.0.0.1}:5061:5061/tcp" publish line in
#      docker-compose.yml (kamailio service).
#   3. Add  #!define TLS_ENABLE  to kamailio.cfg, then `kamailio -c` to validate, then
#      restart kamailio. Verify with: openssl s_client -connect <host>:5061.
#
# Load order: kamailio.cfg includes tls.cfg before the auth/database modules so tls.so
# initialises OpenSSL first, as the tls module admin guide recommends.
#
#!ifdef TLS_ENABLE
loadmodule "tls.so"
# enable_tls=yes is REQUIRED in addition to loading tls.so: without it Kamailio does not
# activate the TLS transport even when a tls: listener is present (Kamailio 5.8 tls module
# admin guide, "Quick Start").
enable_tls=yes
modparam("tls", "certificate", "/etc/kamailio/tls/kamailio.crt")
modparam("tls", "private_key", "/etc/kamailio/tls/kamailio.key")
listen=tls:0.0.0.0:5061
#!endif
