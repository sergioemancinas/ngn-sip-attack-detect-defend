# Topology hiding (Kamailio topoh). Gated by TOPOH_ENABLE so it is inert by default and
# config-check passes. When enabled, topoh masks Via / Record-Route / Contact and the
# internal Asterisk address in proxied messages, removing the routing-topology detail that
# aids reconnaissance once the SBC is exposed.
#
# Enable: set a non-guessable mask key, add  #!define TOPOH_ENABLE  to kamailio.cfg,
# validate with `kamailio -c`, restart, then re-run the SIPp smoke (the original placeholder
# gate) to confirm calls still complete with masked headers.
#
#!ifdef TOPOH_ENABLE
loadmodule "topoh.so"
modparam("topoh", "mask_key", "CHANGE_ME_TOPOH_KEY")
modparam("topoh", "mask_callid", 1)
#!endif
