title: Low And Slow Kamailio SIP Credential Attack
id: 461fa0d2-15a9-4762-98ec-5f5b4111fe6e
status: test
description: Detects twelve or more Kamailio SIP authentication failures from the same source IP within ten minutes.
references:
  - https://attack.mitre.org/techniques/T1110/003/
correlation:
  type: event_count
  rules:
    - kamailio_auth_failure
  group-by:
    - srcip
  timespan: 10m
  condition:
    gte: 12
  generate: true
falsepositives:
  - Misconfigured endpoint polling with invalid credentials.
level: medium
tags:
  - attack.credential_access
  - attack.t1110.003
