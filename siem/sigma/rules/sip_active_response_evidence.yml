title: SIP SOAR Action Acknowledgement
id: fad0089c-ae8e-495e-b443-bab6f9f687bc
status: test
description: Detects Kamailio or Asterisk-side logs that confirm a SIP control-plane response playbook completed.
references:
  - https://attack.mitre.org/techniques/T1499/
logsource:
  product: ngn-sip
  service: sip-control-plane
  definition: SIP control-plane log event. The detection uses raw acknowledgement keywords because no dedicated SOAR fields are decoded.
detection:
  keywords:
    - SOAR-ACTION-TAKEN
    - SOAR_ACTION_TAKEN
    - soar_ack
    - response playbook completed
  condition: keywords
falsepositives:
  - Test-mode workflow acknowledgements from tabletop exercises.
level: low
tags:
  - attack.impact
  - attack.t1499
