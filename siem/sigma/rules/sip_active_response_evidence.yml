title: Kamailio Ban Table Drop Hit
id: 089a6934-c652-4b27-8ef2-077022e017c9
status: test
description: Detects Kamailio logs that show traffic dropped from an already banned SIP source.
references:
  - https://attack.mitre.org/techniques/T1499/
logsource:
  product: ngn-sip
  service: kamailio
  definition: Kamailio control-plane syslog event. The detection relies on the raw Dropping banned SIP source keyword.
detection:
  keywords:
    - Dropping banned SIP source
  condition: keywords
falsepositives:
  - Repeated retransmits from a previously blocked legitimate test host.
level: medium
tags:
  - attack.impact
  - attack.t1499
