title: Asterisk RTP Relay Abuse Indicator
id: 52b0fd79-4fc7-4a9b-86a7-63aed7030cf2
status: test
description: Detects Asterisk media log messages for unsolicited, invalid, unknown, or flooding RTP behavior.
references:
  - https://attack.mitre.org/techniques/T1040/
logsource:
  product: ngn-sip
  service: asterisk-pjsip
  definition: Asterisk full log decoded into module and message by siem/wazuh/decoders/asterisk.xml.
detection:
  selection:
    message|re: '(?i)(rtp.*(unknown|unsolicited|flood|invalid)|strict[- ]rtp.*(failed|timeout))'
  condition: selection
falsepositives:
  - Packet-loss stress tests or codec negotiation experiments.
level: medium
tags:
  - attack.collection
  - attack.t1040
