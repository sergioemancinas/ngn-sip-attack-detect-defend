<ossec_config>
  <!-- Global manager output settings -->
  <global>
    <logall>yes</logall>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <email_notification>no</email_notification>
  </global>

  <!-- Alert thresholding -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Remote daemon tuning for higher agent connection pressure -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp,udp</protocol>
    <queue_size>262144</queue_size>
    <rids_closing_time>30m</rids_closing_time>
    <connection_overtake_time>600</connection_overtake_time>
    <agents>
      <allow_higher_versions>no</allow_higher_versions>
    </agents>
  </remote>

  <!-- Legacy provider-based feed selection for Debian/Ubuntu/RedHat -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <run_on_start>yes</run_on_start>

    <provider name="debian">
      <enabled>yes</enabled>
      <os>bullseye</os>
      <os>bookworm</os>
      <update_interval>1h</update_interval>
    </provider>

    <provider name="canonical">
      <enabled>yes</enabled>
      <os>focal</os>
      <os>jammy</os>
      <os>noble</os>
      <update_interval>1h</update_interval>
    </provider>

    <provider name="redhat">
      <enabled>yes</enabled>
      <os>8</os>
      <os>9</os>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

  <rootcheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>
  </rootcheck>

  <wodle name='syscollector'>
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- Already added in manager tuning baseline -->
  <wodle name='docker-listener'>
    <disabled>no</disabled>
    <interval>1m</interval>
    <attempts>5</attempts>
  </wodle>

  <!-- OpenSCAP evaluation scheduling -->
  <wodle name='open-scap'>
    <disabled>no</disabled>
    <interval>1d</interval>
    <scan-on-start>yes</scan-on-start>
  </wodle>

  <!-- Kamailio log ingestion from wazuh-logcollector mount -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/wazuh-logcollector/var/log/kamailio/kamailio.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/wazuh-logcollector/var/log/kamailio/kamailio.log.*</location>
  </localfile>

  <!--
